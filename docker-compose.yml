services:

  # ==========================
  # Spring Boot Application
  # ==========================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: taskflow-app:latest
    container_name: taskflow-app
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: docker

      # PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskflow
      SPRING_DATASOURCE_USERNAME: taskflow
      SPRING_DATASOURCE_PASSWORD: taskflow

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: taskflow

      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      # Elasticsearch
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200

    networks:
      - taskflow-network

  # ==========================
  # PostgreSQL
  # ==========================
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - taskflow-network

  # ==========================
  # Redis
  # ==========================
  redis:
    image: redis:7.4-alpine
    container_name: taskflow-redis
    restart: unless-stopped

    command: >
      redis-server
      --requirepass taskflow
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "taskflow", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - taskflow-network

  # ==========================
  # Apache Kafka (KRaft)
  # ==========================
  kafka:
    image: apache/kafka:4.3.1
    container_name: taskflow-kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://:29092,PLAINTEXT_EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw

    volumes:
      - kafka_data:/var/lib/kafka/data

    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - taskflow-network

  # ==========================
  # Elasticsearch
  # ==========================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.1
    container_name: taskflow-elasticsearch
    restart: unless-stopped

    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      cluster.name: taskflow-cluster

    ports:
      - "9200:9200"

    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs http://localhost:9200/_cluster/health | grep -E '\"status\":\"(yellow|green)\"'"
        ]
      interval: 30s
      timeout: 10s
      retries: 10

    networks:
      - taskflow-network

# ==========================
# Networks
# ==========================
networks:
  taskflow-network:
    driver: bridge

# ==========================
# Volumes
# ==========================
volumes:
  postgres_data:
  redis_data:
  kafka_data:
  elasticsearch_data: